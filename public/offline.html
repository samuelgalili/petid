<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Petid — אופליין</title>
  <meta name="theme-color" content="#0099E6" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .paw {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      font-size: 0.95rem;
      color: #999;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      background: #0099E6;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .retry-btn:active { transform: scale(0.95); opacity: 0.9; }
    .dots {
      position: fixed;
      bottom: 2rem;
      display: flex;
      gap: 0.5rem;
      opacity: 0.3;
    }
    .dots span { font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="paw">🐾</div>
  <h1>אופס, אין חיבור</h1>
  <p>נראה שאין חיבור לאינטרנט כרגע. בדוק את החיבור ונסה שוב.</p>
  <button class="retry-btn" onclick="location.reload()">נסה שוב</button>
  <div class="dots">
    <span>🐾</span><span>🐾</span><span>🐾</span>
  </div>
</body>
</html>
